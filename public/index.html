<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Administrativo - Tesis</title>
    <link rel="stylesheet" href="style.css">
    <meta name="theme-color" content="#1a1a1a">

    <style>
        .admin-overlay {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            background: rgba(26, 26, 26, 0.95);
            color: white;
            text-align: center;
            padding: 20px;
        }

        .opciones-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 10px;
            width: 100%;
        }
    </style>
</head>

<body>

    <!-- BOTÓN -->
    <div id="chat-toggle">💬</div>

    <!-- NOTIFICACIÓN -->
    <div id="chat-notification" class="chat-notification hidden">!</div>

    <!-- CHAT -->
    <div class="chat-container" id="chat">

        <header>
            <h2>ASISTENTE UNIVERSITARIO IA</h2>
            
            <div style="margin-top: 10px; display: flex; justify-content: center; gap: 10px;">
                <span id="status" style="font-size: 0.75rem; background: rgba(255,255,255,0.1); padding: 3px 10px; border-radius: 20px;">
                    <span style="color: #00ff00;">●</span> Conectado
                </span>

                <a href="metrics.html?from=admin" id="admin-btn" class="metrics-btn" style="display: none;">Ver Métricas 📊</a>
            </div>
        </header>

        <div id="chat-box" class="chat-box">
            <div id="admin-message-overlay" class="admin-overlay">
                <h3>MODO ADMINISTRADOR</h3>
                <p style="color: #ccc; font-size: 0.9rem;">
                    El chat está deshabilitado en este perfil.
                </p>
            </div>
        </div>

        <!-- TYPING -->
        <div id="typing-indicator" class="typing hidden">
            <span></span><span></span><span></span>
        </div>

        <div id="input-area" class="input-area">
            <input type="text" id="user-input" placeholder="Escribe tu consulta aquí..." autocomplete="off">
            <button id="send-btn">Enviar</button>
        </div>

    </div>

    <!-- ADMIN -->
    <script>
        const params = new URLSearchParams(window.location.search);
        const isAdmin = params.get('role') === 'admin';

        if (isAdmin) {
            document.getElementById('admin-btn').style.display = 'inline-block';
            document.getElementById('input-area').style.display = 'none';

            const overlay = document.getElementById('admin-message-overlay');
            overlay.style.display = 'flex';
        }
    </script>

    <!-- TOGGLE -->
    <script>
        const chatToggle = document.getElementById("chat-toggle");
        const chat = document.getElementById("chat");
        const notification = document.getElementById("chat-notification");

        let chatAbierto = false;

        chatToggle.addEventListener("click", () => {
            chat.classList.toggle("active");
            chatAbierto = !chatAbierto;

            if (chatAbierto) {
                notification.classList.add("hidden");
            }
        });
    </script>

    <!-- 🔥 PRO FIX (NO ROMPE FETCH) -->
    <script>
        const chatBox = document.getElementById("chat-box");
        const typing = document.getElementById("typing-indicator");
        const input = document.getElementById("user-input");
        const sendBtn = document.getElementById("send-btn");

        function mostrarTyping() {
            typing.classList.remove("hidden");
            chatBox.appendChild(typing);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function ocultarTyping() {
            typing.classList.add("hidden");
        }

        function nuevaNotificacion() {
            if (!chatAbierto) {
                notification.classList.remove("hidden");
            }
        }

        // 🔥 SOLO VISUAL (NO TOCA TU LÓGICA)
        function hookEnvio() {
            mostrarTyping();

            setTimeout(() => {
                ocultarTyping();
                nuevaNotificacion();
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 700);
        }

        // 🔥 ESCUCHA TU BOTÓN REAL
        sendBtn.addEventListener("click", hookEnvio);

        // 🔥 ESCUCHA ENTER
        input.addEventListener("keypress", (e) => {
            if (e.key === "Enter") {
                hookEnvio();
            }
        });
    </script>

    <script src="script.js"></script>
</body>
</html>
